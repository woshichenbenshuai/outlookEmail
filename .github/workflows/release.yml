name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 2.0.10，不带 v 前缀）'
        required: true
        type: string

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        shell: bash
        run: pyinstaller --noconfirm --clean outlookEmail.spec

      - name: Package release asset
        id: package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $assetName = "OutlookEmail-windows-x64-$version.zip"
          Compress-Archive -Path "dist/OutlookEmail.exe", "README.md" -DestinationPath $assetName -Force
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Upload packaged executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ steps.package.outputs.asset_name }}

  release:
    needs: build-windows-exe
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v${VERSION}"
          export VERSION TAG GITHUB_OUTPUT
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ['VERSION']
          tag = os.environ['TAG']
          out = Path(os.environ['GITHUB_OUTPUT'])
          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8') if changelog.exists() else ''
          pattern = re.compile(r'^## \[' + re.escape(version) + r'\].*?(?=^## \[|\Z)', re.M | re.S)
          m = pattern.search(text)
          if m:
              body = m.group(0).strip() + '\n'
          else:
              body = f'## {tag}\n\nRelease {tag}.\n'
          with out.open('a', encoding='utf-8') as f:
              f.write('body<<EOF\n')
              f.write(body)
              if not body.endswith('\n'):
                  f.write('\n')
              f.write('EOF\n')
          PY

      - name: Download packaged executable
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: release-assets/*
